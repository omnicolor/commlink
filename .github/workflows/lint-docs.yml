name: Documentation

permissions:
  contents: read

on:
  push:
    paths:
      - 'public/openapi/**'

jobs:
  openapi-lint:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v7.0.0
      - uses: actions/checkout@v7.0.1
      - name: Validate OpenAPI spec
        run: npx @redocly/cli lint public/openapi/openapi.yml
